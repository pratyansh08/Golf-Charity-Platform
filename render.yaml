services:
  - type: web
    name: golf-charity-backend
    env: node
    rootDir: backend
    plan: free
    autoDeploy: true
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DB_SSL
        value: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: AUTH_COOKIE_NAME
        value: golf_charity_token
      - key: PAYMENT_PROVIDER
        value: mock
      - key: ENABLE_MONTHLY_DRAW_SCHEDULER
        value: true
      - key: DRAW_SCHEDULE_DAY_OF_MONTH
        value: 1
      - key: DRAW_SCHEDULER_INTERVAL_HOURS
        value: 6
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
